<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer - Al-Ittihad Kebarongan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body>

    <footer class="gradient-bg text-white py-8">
        <div class="container mx-auto px-4">
            <div class="text-center">
                <div class="flex items-center justify-center space-x-3 mb-4">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                        <i class="fas fa-mosque text-blue-600 text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold">Al-Ittihad</h3>
                        <p class="text-xs text-blue-100">Kebarongan</p>
                    </div>
                </div>
                
                <div class="space-y-3 mb-6">
                    <div class="flex items-center justify-center space-x-3">
                        <i class="fas fa-map-marker-alt"></i>
                        <p class="text-sm">Jl. Raya Buntu Timur Km. 03 Gg. Kethileng Kebarongan Kemranjen Banyumas Jawa Tengah 53194</p>
                    </div>
                    <div class="flex items-center justify-center space-x-3">
                        <i class="fas fa-envelope"></i>
                        <a href="mailto:admin@alittihadkebarongan.com" class="text-sm hover:text-blue-200 transition">admin@alittihadkebarongan.com</a>
                    </div>
                </div>
                
                <div class="border-t border-blue-400 pt-4">
                    <p class="text-sm text-blue-100">© 2024 Yayasan Al-Ittihad Kebarongan. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

</html>
